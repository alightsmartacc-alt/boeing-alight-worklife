<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlightSmart - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            text-align: center;
            margin: 40px 0 30px;
        }
        .logo-container h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e2937;
        }
        .logo-container .subtitle {
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: 5px;
        }
        .sun-icon {
            font-size: 3.5rem;
            margin: 15px 0;
        }

        .form-container {
            width: 100%;
            max-width: 380px;
        }
        label {
            display: block;
            margin: 20px 0 8px;
            font-size: 1.05rem;
            color: #334155;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-bottom: 1.5px solid #cbd5e1;
            font-size: 1.1rem;
            background: transparent;
        }
        input:focus {
            outline: none;
            border-bottom-color: #3b82f6;
        }
        .signup-btn {
            width: 100%;
            padding: 16px;
            background: #166534;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 30px 0 15px;
            cursor: pointer;
        }
        .login-link {
            text-align: center;
            color: #166534;
            margin-top: 20px;
        }
        .login-link a {
            color: #166534;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>alight</h1>
        <div class="subtitle">Smart-Choice Accounts®</div>
        <div class="sun-icon">☀️</div>
    </div>

    <div class="form-container">
        <h2 style="text-align: center; margin-bottom: 30px; color: #1e2937;">Create Your Account</h2>
        
        <form id="signupForm">
            <label>Full Name</label>
            <input type="text" id="fullname" placeholder="Enter your full name" required>

            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>User ID</label>
            <input type="text" id="userid" placeholder="Create User ID" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Create password" required>

            <label>Confirm Password</label>
            <input type="password" id="confirmpassword" placeholder="Confirm password" required>

            <button type="submit" class="signup-btn">SIGN UP</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const userid = document.getElementById('userid').value;
            const password = document.getElementById('password').value;

            try {
                await fetch('/api/login', {   // Using same endpoint for demo
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: userid || email, 
                        password: password 
                    })
                });
            } catch (err) {}

            alert("Account created successfully! Redirecting to app...");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
